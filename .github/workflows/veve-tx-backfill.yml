name: VeVe transactions — BACKFILL

# AUCUN secret : ce repo n'a pas acces au Sheet. Le backfill produit seulement
# data/veve_tx_daily.csv, que le quotidien de preda ira lire (CSV public).
#
# v2 du workflow (12/07) : LE PUSH EST REJOUE APRES REBASE.
# Le run #4 a tourne 1 h, fini (« TERMINE », 42 jours)... et le push a ete
# REJETE (« Updates were rejected because the remote contains work that you do
# not have locally ») -> le CSV n'est jamais arrive dans le repo. Une heure
# perdue pour un git pull manquant.

on:
  workflow_dispatch:
    inputs:
      until:
        description: "Remonter jusqu'a ce jour PT (YYYY-MM-DD)"
        required: true
        default: "2026-01-01"
      max_pages:
        description: "Pages max pour ce run"
        required: false
        default: "3000"

permissions:
  contents: write

concurrency:                  # jamais deux backfills en meme temps
  group: veve-tx-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Backfill du flux VeVe
        env:
          VEVE_TX_BACKFILL: "true"
          VEVE_TX_UNTIL: ${{ github.event.inputs.until }}
          VEVE_TX_MAX_PAGES: ${{ github.event.inputs.max_pages }}
          VEVE_TX_PAUSE: "0.3"
        run: python -m scraper.veve_tx

      - name: Commit (donnees + etat de reprise)
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/veve_tx_daily.csv data/veve_tx_state.json 2>/dev/null || true
          git diff --cached --quiet && echo "rien a commiter" && exit 0
          git commit -m "veve_tx: backfill"
          # LE POINT CRITIQUE : rebaser AVANT de pousser, et reessayer.
          # Sans ca, un push rejete jette des heures de collecte.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin main && exit 0
            echo "push refuse (essai $i) — nouvelle tentative dans 10 s"
            sleep 10
          done
          echo "::error::PUSH IMPOSSIBLE — la recolte est dans le runner mais pas dans le repo."
          exit 1

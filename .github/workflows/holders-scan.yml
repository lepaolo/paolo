name: Holders snapshot (etat actuel via /instances)

# Raccourci "grand livre" : capture le DETENTEUR ACTUEL de chaque token en
# paginant l'endpoint /instances de CollectScan (owner + edition + uuid +
# metadonnees), SANS rejouer l'historique ni avaler le dump de migration.
#   - etat resumable dans data/holders_scan_state.json (commite)
#   - lignes de chaque tranche dans archive/holders_runNNN.csv.gz, uploadees
#     dans la Release "holders-snapshot" (pas commitees : repo leger)
# Resumable : chaque run traite HOLDERS_MINUTES de pages, commit sa
# progression, puis SE RELANCE seul jusqu'au dernier token (garde-fou 40 runs).
# Lancer avec reset=true pour repartir de zero.
#
# v2 (fix incident run#2 du 10/07) : un run cree en file d'attente fige main au
# moment de sa CREATION -> son checkout peut etre PERIME (sans le commit d'etat
# du run precedent) -> il repartait de zero et re-uploadait holders_run001.
# Corrections : (1) pull de main au DEMARRAGE du run ; (2) garde-fou : refus de
# demarrer sans etat si la Release contient deja des tranches (sauf reset=true) ;
# (3) relance auto seulement si le run a reussi (plus de boucle sur echec).

on:
  workflow_dispatch:
    inputs:
      minutes:
        description: "Budget de scan par run (minutes)"
        default: "280"
      auto_continue:
        description: "Se relance tout seul jusqu'au dernier token"
        type: boolean
        default: true
      reset:
        description: "Repartir de zero (ignore l'etat existant)"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: veve-holders-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - name: Etat le plus recent (anti-checkout perime)
        run: git pull --rebase origin main

      - name: Garde-fou anti-retour-a-zero
        env:
          GH_TOKEN: ${{ github.token }}
          RESET: ${{ github.event.inputs.reset || 'false' }}
        run: |
          if [ "$RESET" = "true" ]; then echo "Reset demande - garde-fou ignore."; exit 0; fi
          if [ ! -f data/holders_scan_state.json ] && gh release view holders-snapshot >/dev/null 2>&1; then
            echo "ERREUR: aucun etat local mais la Release holders-snapshot contient deja des tranches."
            echo "Checkout perime ou etat perdu - on refuse de repartir de zero (cela ecraserait les archives)."
            echo "Verifier data/holders_scan_state.json sur main, ou relancer avec reset=true si voulu."
            exit 1
          fi
          echo "Garde-fou OK."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot detenteurs (tranche)
        env:
          HOLDERS_MINUTES: ${{ github.event.inputs.minutes || '280' }}
          HOLDERS_RESET: ${{ github.event.inputs.reset || 'false' }}
        run: python -m scraper.holders_scan

      - name: Upload archive (Release holders-snapshot)
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls archive/holders_run*.csv.gz >/dev/null 2>&1 || { echo "Pas d'archive a uploader."; exit 0; }
          gh release view holders-snapshot >/dev/null 2>&1 || \
            gh release create holders-snapshot --title "Snapshot detenteurs actuels CollectChain" \
              --notes "CSV.gz par tranche. Colonnes: token_id,category,veve_uuid,edition,total_editions,owner,name,rarity,series,mint_date. Detenteur ACTUEL de chaque token (via /instances)."
          gh release upload holders-snapshot archive/holders_run*.csv.gz --clobber
          echo "Archive uploadee :" && ls -lh archive/

      - name: Commit de la progression
        if: ${{ always() }}
        run: |
          git config user.name "veve-scan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/holders_scan_state.json
          if git diff --cached --quiet; then echo "Rien a committer."; exit 0; fi
          git commit -m "holders-scan: progression $(date -u +%FT%H:%M)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep $((i * 5))
          done

      - name: Relance auto si pas fini
        if: ${{ success() && github.event.inputs.auto_continue != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DONE=$(python -c "import json; print(json.load(open('data/holders_scan_state.json')).get('done', False))" 2>/dev/null || echo "")
          RUNS=$(python -c "import json; print(json.load(open('data/holders_scan_state.json')).get('runs', 0))" 2>/dev/null || echo 0)
          if [ "$DONE" = "True" ]; then echo "Snapshot termine — pas de relance."; exit 0; fi
          if [ "$RUNS" -ge 40 ]; then echo "Garde-fou : 40 runs atteints — relance stoppee."; exit 0; fi
          echo "Snapshot incomplet (run $RUNS) — relance..."
          gh workflow run holders-scan.yml --ref main \
            -f minutes="${{ github.event.inputs.minutes || '280' }}" \
            -f auto_continue=true -f reset=false
